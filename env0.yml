version: 1

deploy:
  steps:
    # This step runs AFTER Terraform apply completes.
    # At this point, TF outputs are available as env vars:
    #   TERRAFORM_OUTPUT_instance_public_ip
    #   TERRAFORM_OUTPUT_private_key_pem
    terraformApply:
      after:
        - echo "==> Terraform done. EC2 IP is: $TERRAFORM_OUTPUT_instance_public_ip"

        - echo "==> Writing SSH private key to file..."
        - echo "$TERRAFORM_OUTPUT_private_key_pem" > /tmp/demo_key.pem
        - chmod 600 /tmp/demo_key.pem

        - echo "==> Building Ansible inventory from TF output..."
        - |
          cat > /tmp/inventory.ini << EOF
          [webservers]
          $TERRAFORM_OUTPUT_instance_public_ip ansible_user=ubuntu ansible_ssh_private_key_file=/tmp/demo_key.pem ansible_ssh_common_args='-o StrictHostKeyChecking=no'
          EOF

        - echo "==> Installing Ansible..."
        - pip3 install ansible --quiet

        - echo "==> Waiting for EC2 to be ready (SSH can take ~30s after creation)..."
        - sleep 30

        - echo "==> Running Ansible playbook..."
        - ansible-playbook playbook.yml -i /tmp/inventory.ini

        - echo "==> Done! Visit http://$TERRAFORM_OUTPUT_instance_public_ip:8080"
