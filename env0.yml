version: 2

deploy:
  steps:
    terraformApply:
      after:
        - name: "Ansible - Create HTTP Server"
          run: |
            # Read TF outputs directly - more reliable than env vars, required for sensitive outputs
            EC2_IP=$(terraform output -raw instance_public_ip)
            SSH_KEY=$(terraform output -raw private_key_pem)

            echo "==> EC2 IP is: $EC2_IP"

            # Write SSH key to file (printf preserves newlines in PEM keys)
            printf '%s\n' "$SSH_KEY" > /tmp/demo_key.pem
            chmod 600 /tmp/demo_key.pem

            # Verify the key looks right
            echo "==> SSH key preview (first line):"
            head -1 /tmp/demo_key.pem

            # Build Ansible inventory
            echo "[webservers]" > /tmp/inventory.ini
            echo "$EC2_IP ansible_user=ubuntu ansible_ssh_private_key_file=/tmp/demo_key.pem ansible_ssh_common_args=-o StrictHostKeyChecking=no" >> /tmp/inventory.ini

            # Install Ansible
            pip3 install ansible --quiet

            # Wait for EC2 SSH to be ready
            echo "==> Waiting 30s for EC2 SSH to be ready..."
            sleep 45

            # Run playbook
            ansible-playbook playbook.yml -i /tmp/inventory.ini

            echo "==> Done! Visit http://$EC2_IP:8080"
