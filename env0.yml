version: 2

deploy:
  steps:
    terraformApply:
      after:
        - name: "Ansible - Create HTTP Server"
          run: |
            echo "$TERRAFORM_OUTPUT_private_key_pem" > /tmp/demo_key.pem
            chmod 600 /tmp/demo_key.pem

            echo "[webservers]" > /tmp/inventory.ini
            echo "$TERRAFORM_OUTPUT_instance_public_ip ansible_user=ubuntu ansible_ssh_private_key_file=/tmp/demo_key.pem ansible_ssh_common_args=-o StrictHostKeyChecking=no" >> /tmp/inventory.ini

            pip3 install ansible --quiet

            echo "==> Waiting for EC2 SSH to be ready..."
            sleep 30

            ansible-playbook playbook.yml -i /tmp/inventory.ini

            echo "==> Done! Visit http://$TERRAFORM_OUTPUT_instance_public_ip:8080"
